name: Lambda PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch PR and default branch
        run: |
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr_branch
          git fetch origin ${{ github.event.repository.default_branch }}:default_branch
          git checkout pr_branch

      - name: Generate PR Diff
        run: |
          git diff default_branch...pr_branch > pr_diff.txt

      - name: Upload PR Diff Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-diff-${{ github.event.pull_request.number }}
          path: pr_diff.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download PR Diff Artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-diff-${{ github.event.pull_request.number }}
          path: ./diff

      
      
      - name: Print PR Diff safely
        run: |
          echo "=== PR Diff Start ==="
          head -n 100 ./diff-inspect/pr_diff.txt  # show first 100 lines
          echo "=== PR Diff End ==="


      - name: Invoke AWS Lambda
        id: lambda
        run: |
          # Create JSON file payload from diff.txt
          jq -Rs '{diff: .}' ./diff/pr_diff.txt > payload.json

          # Call Lambda using the file as payload
          aws lambda invoke \
            --function-name pr-reviewer \
            --payload file://payload.json \
            response.json

          # Save result to GitHub output
          echo "result=$(cat response.json)" >> $GITHUB_OUTPUT


      - name: Post PR Review Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            ### 🤖 AWS Lambda + Bedrock PR Review

            ${{ steps.lambda.outputs.result }}
