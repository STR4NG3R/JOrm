name: Lambda PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch PR + base branches
        run: |
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr_branch
          git fetch origin ${{ github.event.repository.default_branch }}:default_branch
          git checkout pr_branch

      - name: Generate Diff
        id: diff
        run: |
          git diff default_branch...pr_branch > diff.txt
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          sed 's/%/%25/g; s/\n/%0A/g; s/\r/%0D/g' diff.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Invoke Lambda
        id: lambda
        run: |
          echo '${{ steps.diff.outputs.diff }}' > diff.txt
          PAYLOAD=$(jq -R -s '{"diff": .}' diff.txt)

          aws lambda invoke \
            --function-name pr-reviewer \
            --payload "$PAYLOAD" \
            response.json

          echo "result=$(cat response.json)" >> $GITHUB_OUTPUT

      - name: Post Review Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            ### 🤖 AWS Lambda + Bedrock PR Review
            ${{ steps.lambda.outputs.result }}

            