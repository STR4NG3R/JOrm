name: Lambda PR Review
permissions:
  contents: write
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout PR branch
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Fetch PR and default branch
      - name: Fetch PR and default branch
        run: |
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr_branch
          git fetch origin ${{ github.event.repository.default_branch }}:default_branch
          git checkout pr_branch

      # 3. Generate PR diff directly (no artifacts!)
      - name: Generate PR Diff
        run: |
          git diff default_branch...pr_branch > pr_diff.txt

      # 4. Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 5. Base64 encode diff, wrap JSON, invoke Lambda
      - name: Invoke AWS Lambda
        id: lambda
        run: |
          # Strip CRs and encode (prevent Base64 wrapping)
          base64 -w0 pr_diff.txt > pr_diff.b64
          
          # Wrap into JSON for Lambda
          jq -n --rawfile diff pr_diff.b64 '{diff_base64: $diff}' > payload.json

          aws lambda invoke \
            --function-name aws-pr-review \
            --cli-binary-format raw-in-base64-out \
            --payload file://payload.json \
            response.json

          status=$(jq -r '.statusCode' response.json)

          if [ "$status" -eq 200 ]; then
            # Extraer body
            body=$(jq -r '.body' response.json)
            {
              echo "body<<EOF"
              echo "$body"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            # Mensaje fallback
            {
              echo "body<<EOF"
              echo "⚠️ AWS Lambda PR Review failed (status code: $status)."
              echo "Please check Lambda logs."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi          

      # 6. Post result to PR
      - name: Post PR Review Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            ### 🤖 AWS Lambda + Bedrock PR Review

            ${{ steps.lambda.outputs.body }}
