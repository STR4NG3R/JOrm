name: Lambda PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Fetch PR + default branch
      - name: Fetch PR and default branch
        run: |
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr_branch
          git fetch origin ${{ github.event.repository.default_branch }}:default_branch
          git checkout pr_branch

      # 3️⃣ Generate the PR diff
      - name: Generate PR Diff
        run: |
          git diff default_branch...pr_branch > pr_diff.txt

      # 4️⃣ Upload diff as artifact
      - name: Upload PR Diff Artifact
        uses: actions/upload-artifact@v3
        with:
          name: pr-diff-${{ github.event.pull_request.number }}
          path: pr_diff.txt

      # 5️⃣ Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 6️⃣ Download the artifact (optional, could be skipped if in same job)
      - name: Download PR Diff Artifact
        uses: actions/download-artifact@v3
        with:
          name: pr-diff-${{ github.event.pull_request.number }}
          path: ./diff

      # 7️⃣ Invoke Lambda with the diff
      - name: Invoke AWS Lambda
        id: lambda
        run: |
          DIFF=$(cat ./diff/pr_diff.txt)
          PAYLOAD=$(jq -n --arg diff "$DIFF" '{"diff": $diff}')

          aws lambda invoke \
            --function-name pr-reviewer \
            --payload "$PAYLOAD" \
            response.json

          echo "result=$(cat response.json)" >> $GITHUB_OUTPUT

      # 8️⃣ Post PR comment with Lambda review
      - name: Post PR Review Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            ### 🤖 AWS Lambda + Bedrock PR Review

            ${{ steps.lambda.outputs.result }}
